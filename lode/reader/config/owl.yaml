name: OWL

namespaces:
  - "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
  - "http://www.w3.org/2000/01/rdf-schema#"
  - "http://www.w3.org/2002/07/owl#"
  - "http://www.w3.org/2001/XMLSchema#"
  - "http://www.w3.org/2003/11/swrl#"

allowed_classes:
  - Statement
  - Literal
  - Relation
  - Property
  - Container
  - Concept
  - Attribute
  - Datatype
  - Individual
  - Model
  - Annotation
  - TruthFunction
  - Value
  - OneOf
  - Quantifier
  - Cardinality
  - PropertyConceptRestriction
  - DatatypeRestriction
  - Collection
  - Restriction
  - Resource
  - Variable 
  - Atom
  - Rule


# IF TARGET CLASSES > 1 IT HAS TO HAVE AN HANDLER TO CHOOSE WHICH IS THE TARGET DEPENDING ON THRE CONTEXT

