name: BASE

namespaces:
  - "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
  - "http://www.w3.org/2000/01/rdf-schema#"
  - "http://www.w3.org/2001/XMLSchema#"
  - "http://www.w3.org/2003/11/swrl#"

allowed_classes:
  - Statement
  - Property
  - Container
  - Datatype
  - Literal
  - Resource
  - Concept

# ======================
# MAPPER
# ======================
mapper:

  # ========== Classification, no behavior ==========

  rdfs:Literal:
    is: class
    target_class: Literal

  # All definitions belonging to reasoning are excluded
  # such as owl:bottomObjectPorperty owl:topObjectProperty, owl:bottomObjectProperty, owl:topDataProperty, owl:bottomDataProperty, owl:Thing, owl:Nothing


  # rdfs:Container, rdfs:ContainerMembershipProperty, rdfs:member
  # skos:memberList, skos:narrower [!!], skos:inScheme [!!!], skos:narrowerTransitive, skos:semanticRelation, skos:broaderTransitive, skos:mappingRelation

  rdfs:Datatype:
    is: class
    target_class: Datatype 

  rdf:Property:
    is: class
    target_class: Property
  
  # ========== Property ==========
  rdfs:domain:
    is: predicate
    target_classes: [Property]
    setters: [set_has_domain: Concept]
    
  rdfs:range:
    is: predicate
    target_classes: [Property]
    setters: [set_has_range: Resource]
    
  rdfs:subPropertyOf:
    is: predicate
    inferred_class: Property
    target_classes: [Property]
    setters: [set_is_sub_property_of: Property]
  
  # ========== Concept ==========
  rdfs:subClassOf:
    is: predicate
    target_classes: [Concept]
    setters: [set_is_sub_concept_of: Concept]
  
  # ========== Statement/Annotation ==========
  
  rdfs:Class:
    is: class
    target_class: Concept
  

  
  # owl:Thing:
  #   is: class
  #   target_class: Individual
  
  # owl:Nothing:
  #   is: class
  #   target_class: Individual


  # ========== Resource ==========

  rdfs:Resource:
    is: class 
    target_class: Resource

  rdfs:label:
    is: predicate
    target_classes: [Resource]
    setters: [set_has_label: Literal]
    
  rdfs:comment:
    is: predicate
    target_classes: [Resource]
    setters: [set_has_comment: Literal]
  
  # ========== Resource Object Properties ==========

  rdfs:seeAlso:
    is: predicate
    target_classes: [Resource]
    setters: [set_see_also: Resource]

  rdfs:isDefinedBy:
    is: predicate
    target_classes: [Resource]
    setters: [set_is_defined_by: Resource]
  
  rdf:type:
    is: predicate
    target_classes: [Individual, Resource]
    setters: [set_has_type: Concept]

  # ========== SWRL ==========

  swrl:Variable:
    is: class
    target_class: Variable

  swrl:Imp:
    is: class
    target_class: Rule

  swrl:ClassAtom:
    is: class
    target_class: Atom

  swrl:IndividualPropertyAtom:
    is: class
    target_class: Atom

  swrl:DatavaluedPropertyAtom:
    is: class
    target_class: Atom

  swrl:SameIndividualAtom:
    is: class
    target_class: Atom

  swrl:DifferentIndividualsAtom:
    is: class
    target_class: Atom

  swrl:BuiltinAtom:
    is: class
    target_class: Atom

  swrl:DataRangeAtom:
    is: class
    target_class: Atom

  swrl:argument1:
    is: predicate
    target_classes: [Atom]
    setters: [set_has_argument1: Resource]

  swrl:argument2:
    is: predicate
    target_classes: [Atom]
    setters: [set_has_argument2: Resource]

  swrl:classPredicate:
    is: predicate
    target_classes: [Atom]
    setters: [set_has_predicate: Concept]

  swrl:propertyPredicate:
    is: predicate
    target_classes: [Atom]
    setters: [set_has_predicate: Property]

  swrl:builtin:
    is: predicate
    target_classes: [Atom]
    setters: [set_has_predicate: Annotation]

  swrl:dataRange:
    is: predicate
    target_classes: [Atom]
    setters: [set_has_predicate: Datatype]

  swrl:body:
    is: predicate
    target_classes: [Rule]

  swrl:head:
    is: predicate
    target_classes: [Rule]

# ======================
# ENRICHER
# ======================
enricher:
  swrl:Imp: handle_swrl_imp
 