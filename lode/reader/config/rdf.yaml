name: RDF
fallback_class: Statement

namespaces:
  - "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
  - "http://www.w3.org/2000/01/rdf-schema#"

allowed_classes:
  - Statement
  - Property
  - Container
  - Datatype
  - Literal
  - Resource
  - Concept

mapper: 

  "*":  
    create_statement: true
    target_classes: []

  rdf:Property:
    is: class 
    target_class: Property 

  rdf:Statement:
    is: class 
    target_class: Statement

  rdf:subject:
    is: predicate
    target_classes: [Statement]
    setters: 
      - set_has_subject: Resource

  rdf:predicate:
    is: predicate
    target_classes: [Statement]
    setters: 
      - set_has_predicate: Resource
  
  rdf:object:
    is: predicate
    target_classes: [Statement]
    setters: 
      - set_has_object: Resource

  rdf:Bag:
    is: class
    target_class: Container
    handler: create_python_container
  
  rdf:Alt:
    is: class
    target_class: Container
    handler: create_python_container
    
  rdf:List:
    is: class
    target_class: Container
    handler: create_python_container

  rdf:Seq:
    is: class
    target_class: Container
    handler: create_python_container

enricher: {}